name: CD - HushVoting Website

on:
  push:
    tags:
      - "HushVotingWebsite-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy, for example v1.0.1 or 1.0.1. Leave empty to use a timestamp."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hushnetwork-social/hush-voting-website
  NODE_VERSION: "22"
  PUBLIC_SITE_URL: https://www.hushvoting.com
  APP_SITE_URL: https://app.hushvoting.com
  HUSHSERVERNODE_GRPC_URL: https://api.hushnetwork.social

jobs:
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Run frontend CI contract
        shell: bash
        run: bash scripts/ci/run-frontend-ci.sh

  build-and-deploy:
    name: Build, publish, and deploy
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: HushServerNode AWS CD

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Extract deployment version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW_VERSION="${{ inputs.version }}"

            if [[ -z "${RAW_VERSION}" ]]; then
              VERSION="manual-$(date +%Y%m%d-%H%M%S)"
            elif [[ "${RAW_VERSION}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              VERSION="v${RAW_VERSION#v}"
            else
              echo "::error::Invalid version '${RAW_VERSION}'. Use vMAJOR.MINOR.PATCH, for example v1.0.1."
              exit 1
            fi
          else
            TAG_NAME="${GITHUB_REF_NAME}"

            if [[ ! "${TAG_NAME}" =~ ^HushVotingWebsite-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid deployment tag '${TAG_NAME}'. Expected HushVotingWebsite-vMAJOR.MINOR.PATCH."
              exit 1
            fi

            VERSION="${TAG_NAME#HushVotingWebsite-}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Deploying HushVoting Website ${VERSION}"

      - name: Validate deployable scaffold
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json || { echo "::error::package.json is required before CD can deploy."; exit 1; }
          test -f Dockerfile || { echo "::error::Dockerfile is required before CD can deploy."; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            NEXT_PUBLIC_SITE_URL=${{ env.PUBLIC_SITE_URL }}
            NEXT_PUBLIC_APP_BASE_URL=${{ env.APP_SITE_URL }}
            NEXT_PUBLIC_MARKETING_BASE_URL=${{ env.PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GRPC_URL=${{ env.HUSHSERVERNODE_GRPC_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to AWS Lightsail
        shell: bash
        env:
          SSH_HOST: ${{ secrets.AWS_HOST }}
          SSH_USER: ${{ secrets.AWS_SSH_USER }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PILOT_ACCESS_TO_EMAIL: ${{ secrets.PILOT_ACCESS_TO_EMAIL }}
          PILOT_ACCESS_FROM_EMAIL: ${{ secrets.PILOT_ACCESS_FROM_EMAIL }}
          PILOT_ACCESS_EMAIL_SUBJECT_PREFIX: ${{ secrets.PILOT_ACCESS_EMAIL_SUBJECT_PREFIX }}
        run: |
          LOCAL_ENV_FILE="$(mktemp)"
          trap 'rm -f "${LOCAL_ENV_FILE}"' EXIT
          chmod 600 "${LOCAL_ENV_FILE}"

          {
            printf 'SMTP_HOST=%s\n' "${SMTP_HOST}"
            printf 'SMTP_PORT=%s\n' "${SMTP_PORT}"
            printf 'SMTP_SECURE=%s\n' "${SMTP_SECURE}"
            printf 'SMTP_USER=%s\n' "${SMTP_USER}"
            printf 'SMTP_PASS=%s\n' "${SMTP_PASS}"
            printf 'PILOT_ACCESS_TO_EMAIL=%s\n' "${PILOT_ACCESS_TO_EMAIL}"
            printf 'PILOT_ACCESS_FROM_EMAIL=%s\n' "${PILOT_ACCESS_FROM_EMAIL}"
            printf 'PILOT_ACCESS_EMAIL_SUBJECT_PREFIX=%s\n' "${PILOT_ACCESS_EMAIL_SUBJECT_PREFIX}"
          } > "${LOCAL_ENV_FILE}"

          REMOTE_ENV_FILE="/tmp/hushvoting-website-${IMAGE_TAG}.env"
          scp -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 "${LOCAL_ENV_FILE}" "${SSH_USER}@${SSH_HOST}:${REMOTE_ENV_FILE}"

          ssh -i ~/.ssh/lightsail.pem -o ServerAliveInterval=30 -o ServerAliveCountMax=10 "${SSH_USER}@${SSH_HOST}" "IMAGE_TAG=${IMAGE_TAG}" "GHCR_TOKEN=${GHCR_TOKEN}" "GHCR_USERNAME=${GHCR_USERNAME}" "GHCR_IMAGE=${GHCR_IMAGE}" "REMOTE_ENV_FILE=${REMOTE_ENV_FILE}" 'bash -s' << 'DEPLOY_SCRIPT'
            set -euo pipefail

            CONTAINER_NAME="HushVotingWebSite"
            trap 'rm -f "${REMOTE_ENV_FILE}"' EXIT
            chmod 600 "${REMOTE_ENV_FILE}"

            echo "Starting HushVoting Website deployment of version ${IMAGE_TAG}..."
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            echo "Pulling ${GHCR_IMAGE}:${IMAGE_TAG}..."
            sudo docker pull "${GHCR_IMAGE}:${IMAGE_TAG}"

            echo "Stopping old HushVoting Website container..."
            sudo docker stop "${CONTAINER_NAME}" || true
            sudo docker rm "${CONTAINER_NAME}" || true

            echo "Starting ${CONTAINER_NAME}..."
            sudo docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart always \
              -p 127.0.0.1:3005:80 \
              --env-file "${REMOTE_ENV_FILE}" \
              "${GHCR_IMAGE}:${IMAGE_TAG}"

            echo "Verifying deployment..."
            sleep 5
            if sudo docker ps --filter "name=^/${CONTAINER_NAME}$" --format "{{.Names}}" | grep -qx "${CONTAINER_NAME}"; then
              sudo docker ps --filter "name=${CONTAINER_NAME}" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            else
              sudo docker logs "${CONTAINER_NAME}" --tail 50 || true
              exit 1
            fi

            curl -fsS -I http://127.0.0.1:3005 >/dev/null
            echo "HushVoting Website deployment complete."
          DEPLOY_SCRIPT

      - name: Clean up SSH key
        if: always()
        shell: bash
        run: rm -f ~/.ssh/lightsail.pem

      - name: Deployment summary
        shell: bash
        run: |
          echo "### HushVoting Website Deployment Complete" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Container:** \`HushVotingWebSite\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "**Target:** AWS Lightsail" >> "${GITHUB_STEP_SUMMARY}"
          echo "**URL:** \`${{ env.PUBLIC_SITE_URL }}\`" >> "${GITHUB_STEP_SUMMARY}"
